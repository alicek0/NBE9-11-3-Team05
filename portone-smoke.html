<!doctype html>
<html>

<body>
    <button id="pay">Pay test</button>
    <pre id="out"></pre>

    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script>
        const out = document.getElementById("out");

        document.getElementById("pay").onclick = async () => {
            try {
                console.log(window.PortOne);

                const res = await window.PortOne.requestPayment({
                    storeId: "store-896758d3-2530-4831-b08d-36de59c6b1a1",
                    channelKey: "channel-key-71509810-0792-4bb9-bca4-e1ba76adb6c8",
                    paymentId: "smoke-" + Date.now(),
                    orderName: "smoke test",
                    totalAmount: 1000,
                    currency: "CURRENCY_KRW",
                    payMethod: "CARD",
                    customer: {
                        fullName: "Test User",
                        email: "test@example.com",
                        phoneNumber: "01000000000",
                    },
                    redirectUrl: location.href,
                });

                out.textContent = JSON.stringify(res, null, 2);
            } catch (e) {
                out.textContent = String(e && (e.stack || e.message) || e);
            }
        };
    </script>
</body>

</html>
