<!doctype html>
<html>

<body>
    <button id="pay">Pay test</button>
    <pre id="out"></pre>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script>
        const out = document.getElementById("out");
        document.getElementById("pay").onclick = async () => {
            try {
                // 1. 백엔드에서 paymentId 발급
                const prepareRes = await fetch("http://localhost:8080/api/v1/donations/prepare", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiIzNCIsInJvbGVzIjpbIlVTRVIiXSwiaWF0IjoxNzc5MDI3NzgwLCJleHAiOjE3NzkwMzQ5ODB9.HPzNaqOxsNXBm71qFVilWnLM4508Z5D7C6jqBesZT0NMiaNqDwdFbgdh8gsKWu8CM7DDy0zu1hoge9H1uuWuwA"  // 로그인 후 토큰 넣기
                    },
                    body: JSON.stringify({ campaignId: 11, amount: 1000 })
                });
                const { paymentId } = await prepareRes.json();
                out.textContent = "paymentId: " + paymentId;

                // 2. 포트원 결제창 호출
                const res = await window.PortOne.requestPayment({
                    storeId: "store-896758d3-2530-4831-b08d-36de59c6b1a1",
                    channelKey: "channel-key-71509810-0792-4bb9-bca4-e1ba76adb6c8",
                    paymentId: paymentId, //"donate-1779029313088"
                    orderName: "test",
                    totalAmount: 1000,
                    currency: "CURRENCY_KRW",
                    payMethod: "CARD",
                    customer: {
                        fullName: "Test User",
                        email: "test@example.com",
                        phoneNumber: "01000000000",
                    },
                    redirectUrl: location.href,
                });
                out.textContent = JSON.stringify(res, null, 2);
            } catch (e) {
                out.textContent = String(e && (e.stack || e.message) || e);
            }
        };
    </script>
</body>

</html>
