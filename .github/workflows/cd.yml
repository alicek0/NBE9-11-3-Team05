name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build & Push Docker Image
        run: |
          ./gradlew build -x test -p backend

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t alicekangisy/petmeeting-backend ./backend
          docker push alicekangisy/petmeeting-backend

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd NBE9-11-3-Team05/backend
            echo "${{ secrets.ENV_FILE }}" > .env
            docker compose pull
            docker compose up -d
