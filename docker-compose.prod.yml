services:
  nginx:
    image: nginx:alpine
    container_name: petmeeting-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  certbot:
    image: certbot/certbot
    container_name: petmeeting-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

  backend:
    image: alicekangisy/petmeeting-backend:latest
    container_name: petmeeting-backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: petmeeting-redis
      SPRING_DATA_REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx512m"

    mem_limit: 700m

    depends_on:
      - redis
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7
    container_name: petmeeting-redis
    restart: always

volumes:
  certbot-www:
  certbot-certs:
